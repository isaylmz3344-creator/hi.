<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Annemin İstek Listesi</title>
                <style>
                        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; text-align: center; background-color: #f8f9fa; }
                                h1 { color: #333; margin-bottom: 5px; }
                                        .arama-kutusu { padding: 12px 20px; width: 80%; max-width: 400px; font-size: 16px; border-radius: 25px; border: 2px solid #28a745; margin: 20px auto; display: block; outline: none; }
                                                .grid-konteyner { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
                                                        .urun { border: 1px solid #ddd; padding: 15px; background: white; border-radius: 12px; width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                                                                .urun h3 { margin: 0 0 15px 0; color: #444; font-size: 16px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
                                                                        .sayac { font-size: 20px; font-weight: bold; margin: 0 15px; min-width: 30px; display: inline-block; }
                                                                                button { font-size: 18px; cursor: pointer; padding: 5px 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; }
                                                                                        button:active { background: #eee; }
                                                                                                .iste-btn { background-color: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 6px; margin-top: 15px; width: 100%; font-weight: bold; }
                                                                                                        .iste-btn:active { background-color: #218838; }
                                                                                                            </style>
                                                                                                            </head>
                                                                                                            <body>

                                                                                                                <h1>🛒 Ev İçi Sipariş Paneli</h1>
                                                                                                                    <p>Annem ne istiyorsa aratıp seçebilir ve "İste" butonuna basabilir.</p>

                                                                                                                        <input type="text" id="aramaInput" class="arama-kutusu" placeholder="Ürün ara... (Örn: Ekmek, Yoğurt)" onkeyup="urunAra()">

                                                                                                                            <div class="grid-konteyner" id="urun-listesi"></div>

                                                                                                                                <script>
                                                                                                                                        const urunler = [
                                                                                                                                                    "Ekmek", "Yoğurt", 
                                                                                                                                                                "Tuz", "Karabiber", "Pul Biber", "Kimyon", "Kekik", "Nane", "Kırmızı Toz Biber",
                                                                                                                                                                            "Domates Salçası", "Biber Salçası", "Nar Ekşisi", "Ketçap", "Mayonez",
                                                                                                                                                                                        "UHT Süt", "Beyaz Peynir", "Kaşar Peyniri", "Lor Peyniri",
                                                                                                                                                                                                    "Siyah Zeytin", "Yeşil Zeytin", "Bal", "Reçel", "Tahin", "Pekmez", "Yumurta",
                                                                                                                                                                                                                "Dana Kıyma", "Kuşbaşı Dana Eti", "Tavuk Göğsü", "Tavuk Pirzola", "Balık Çeşitleri", "Ton Balığı Konservesi",
                                                                                                                                                                                                                            "Patates", "Soğan", "Sarımsak", "Havuç",
                                                                                                                                                                                                                                        "Domates", "Salatalık", "Biber", "Marul", "Maydanoz", "Limon",
                                                                                                                                                                                                                                                    "Mevsim Meyveleri (Elma, Muz, Portakal vb.)",
                                                                                                                                                                                                                                                                "Hazır Çorba", "Konserve Mısır", "Garnitür", "Bezelye Konservesi", "Domates Püresi",
                                                                                                                                                                                                                                                                            "Dondurulmuş Bezelye", "Dondurulmuş Mısır", "Dondurulmuş Patates Kroket/Cipsi", "Mantı",
                                                                                                                                                                                                                                                                                        "Siyah Çay", "Türk Kahvesi", "Filtre Kahve", "Bitki/Meyve Çayı",
                                                                                                                                                                                                                                                                                                    "Bisküvi", "Çikolata", "Kuruyemiş (Ceviz, Fındık, Badem)"
                                                                                                                                                                                                                                                                                                            ];

                                                                                                                                                                                                                                                                                                                    const listeKonteyner = document.getElementById('urun-listesi');

                                                                                                                                                                                                                                                                                                                            urunler.forEach((urun, index) => {
                                                                                                                                                                                                                                                                                                                                        let id = `urun-${index}`;
                                                                                                                                                                                                                                                                                                                                                    let urunHtml = `
                                                                                                                                                                                                                                                                                                                                                                    <div class="urun" data-isim="${urun.toLowerCase()}">
                                                                                                                                                                                                                                                                                                                                                                                        <h3>${urun}</h3>
                                                                                                                                                                                                                                                                                                                                                                                                            <button onclick="degistir('${id}', -1)">-</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                <span id="${id}-adet" class="sayac">0</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="degistir('${id}', 1)">+</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="iste-btn" onclick="istekGonder('${urun}', '${id}-adet')">İste</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                listeKonteyner.innerHTML += urunHtml;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function urunAra() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let girdi = document.getElementById('aramaInput').value.toLowerCase();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let urunKartlari = document.getElementsByClassName('urun');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for (let i = 0; i < urunKartlari.length; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let urunIsmi = urunKartlari[i].getAttribute('data-isim');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (urunIsmi.includes(girdi)) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        urunKartlari[i].style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            urunKartlari[i].style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function degistir(id, miktar) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let element = document.getElementById(id + '-adet');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let mevcut = parseInt(element.innerText);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let yeni = mevcut + miktar;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (yeni >= 0) { element.innerText = yeni; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // 🚨 HATANIN DÜZELDİĞİ YER BURASI:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function istekGonder(urunAdi, elementId) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let adet = document.getElementById(elementId).innerText;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (adet == "0") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert("Lütfen önce miktar seçin! 😊");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let konu = "ev_istekleri_99"; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let mesaj = `Annem istedi: ${adet} adet ${urunAdi}`;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Hatalı olan "${conu}" kelimesini "${konu}" olarak düzelttim
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fetch(`https://ntfy.sh/${konu}`, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    method: 'POST',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    body: mesaj,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    headers: { 'Title': 'Yeni Ev Siparişi!' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .then(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alert(`👍 ${adet} adet ${urunAdi} istendi!`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById(elementId).innerText = "0"; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .catch(err => alert("İstek gönderilemedi, interneti kontrol et."));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
